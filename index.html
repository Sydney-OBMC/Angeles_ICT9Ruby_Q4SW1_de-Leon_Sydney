<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Q4 Seatwork 1</title>
  <style>
     body{
            font-family: Arial;
            background: linear-gradient(to right, #ffffff, #f3beec);
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .box{
            background: #65b5c0;
            border-style: dotted;
            padding: 25px;
            width: 280px;
            border-radius: 15px;
            text-align: center;
            color: white;
    
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 20px;
            border: none;
            text-align: center;
        }

        button{
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            
        }

        .login-btn { background: #5ec6ff; }
        .cancel-btn { background: #ccc; }

        #message{
            margin-top: 10px;
            font-size: 14px;
        }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css " rel="stylesheet">
</head>
<body>
    <div class="box">
        <h2 style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Login Page</h2>

        <input type="text" id="username" placeholder="Enter Username">

        <br>
        <br>

        <input type="text" id="password" placeholder="Enter Password">

        <br>
        <br>

        <button class="login-btn" onclick="login()" style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Log in</button>
        <button onclick="clearFields()" style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;">Cancel</button>

        <p id="message"></p>
    </div>

    <script>
        var C_Username = "sydsocute123";
        var C_Password = "676869";

        var attempts = 0;
        var maxAttempts = 3;

        function login(){
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            if (attempts >= maxAttempts){
                document.getElementById("message").innerText =
                    "Account LOCKED. Too many failed attempts. Try again later.";
                alert("Account LOCKED. Too many failed attempts.");
                return;
            }

            if (username === C_Username && password === C_Password){
                alert("Welcome " + username + "!");
                document.getElementById("message").innerText = "Login successful!";
            } else{
                attempts++;
                alert("Incorrect username and/or password");

                document.getElementById("message").innerText = "Attempts left: " + (maxAttempts - attempts);
            }

            if (attempts >= maxAttempts){
                document.getElementById("message").innerText = "Account LOCKED. Too many failed attempts. Try again later.";
                alert("Account LOCKED. Too many failed attempts.");
            }
        }

        function clearFields(){
            alert("Clicked");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("message").innerText = "";
        }
    </script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js "></script>
</body>
</html>
